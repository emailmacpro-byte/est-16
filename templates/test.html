<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} · RIASEC.mn</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --cream: #FDF8F2;
            --dark: #0F0D0A;
            --orange: #E8603C;
            --blue: #2E86AB;
            --purple: #7B2D8B;
            --green: #2D9B4E;
            --gold: #C9A227;
            --navy: #1B4F72;
            --text: #2C2416;
            --text-muted: #7A6E5F;
            --border: #E8DDD0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--cream);
            color: var(--text);
            min-height: 100vh;
        }

        /* TOP BAR */
        .topbar {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(253, 248, 242, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 16px 40px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.85rem;
            font-weight: 600;
            transition: color 0.2s;
        }

        .back-btn:hover { color: var(--text); }

        .test-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .test-badge {
            background: var(--dark);
            color: var(--cream);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .test-meta {
            font-size: 0.82rem;
            color: var(--text-muted);
        }

        .progress-info {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .q-counter {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-muted);
        }

        .q-counter span { color: var(--dark); }

        /* PROGRESS BAR */
        .progress-bar-wrap {
            position: fixed;
            top: 61px;
            left: 0; right: 0;
            height: 4px;
            background: var(--border);
            z-index: 99;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--orange), #F4A261);
            transition: width 0.4s ease;
            width: 0%;
        }

        /* MAIN LAYOUT */
        .main {
            max-width: 800px;
            margin: 0 auto;
            padding: 120px 40px 80px;
        }

        /* QUESTION CARD */
        .question-container {
            display: none;
        }

        .question-container.active {
            display: block;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .q-header {
            margin-bottom: 48px;
        }

        .q-type-tag {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            margin-bottom: 24px;
        }

        .q-num {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .q-text {
            font-size: clamp(1.3rem, 3vw, 1.8rem);
            font-weight: 700;
            line-height: 1.4;
            letter-spacing: -0.02em;
            color: var(--dark);
        }

        /* RATING SCALE */
        .scale-label-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .scale-label-text {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-muted);
        }

        .rating-scale {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .rating-btn {
            flex: 1;
            aspect-ratio: 1;
            border: 2px solid var(--border);
            border-radius: 16px;
            background: white;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
            font-family: inherit;
            position: relative;
            overflow: hidden;
        }

        .rating-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .rating-btn:hover {
            border-color: var(--dark);
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }

        .rating-btn.selected {
            border-color: transparent;
            transform: translateY(-3px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            color: white;
        }

        .rating-btn .score {
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1;
        }

        .rating-btn .label {
            font-size: 0.62rem;
            font-weight: 600;
            text-align: center;
            line-height: 1.2;
            opacity: 0.8;
        }

        /* Colors per score */
        .rating-btn[data-score="1"].selected { background: #E74C3C; }
        .rating-btn[data-score="2"].selected { background: #E67E22; }
        .rating-btn[data-score="3"].selected { background: #F1C40F; color: #333; }
        .rating-btn[data-score="4"].selected { background: #27AE60; }
        .rating-btn[data-score="5"].selected { background: #1B4F72; }

        /* NAVIGATION */
        .q-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 48px;
        }

        .nav-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            border: 2px solid var(--border);
            background: white;
            color: var(--text);
            font-family: inherit;
            transition: all 0.2s;
        }

        .nav-btn:hover:not(:disabled) {
            border-color: var(--dark);
            background: var(--dark);
            color: white;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .nav-btn.primary {
            background: var(--dark);
            color: var(--cream);
            border-color: var(--dark);
        }

        .nav-btn.primary:hover:not(:disabled) {
            background: var(--orange);
            border-color: var(--orange);
        }

        /* MINI PROGRESS DOTS */
        .progress-dots {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            max-width: 320px;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border);
            transition: all 0.3s;
        }

        .dot.answered {
            background: var(--orange);
            transform: scale(1.2);
        }

        .dot.current {
            background: var(--dark);
            transform: scale(1.3);
        }

        /* LOADING STATE */
        .calculating {
            display: none;
            text-align: center;
            padding: 80px 40px;
        }

        .calculating.show { display: block; }

        .calc-spinner {
            width: 80px;
            height: 80px;
            border: 4px solid var(--border);
            border-top-color: var(--orange);
            border-radius: 50%;
            margin: 0 auto 32px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .calc-title {
            font-size: 1.6rem;
            font-weight: 800;
            margin-bottom: 12px;
        }

        .calc-sub {
            color: var(--text-muted);
        }

        /* ERROR */
        .error-msg {
            background: #FFF3EE;
            border: 1px solid #F4C4B3;
            color: var(--orange);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-top: 16px;
            display: none;
        }

        .error-msg.show { display: block; }

        @media (max-width: 600px) {
            .main { padding: 100px 20px 60px; }
            .topbar { padding: 12px 20px; }
            .rating-scale { gap: 8px; }
            .rating-btn .label { display: none; }
        }
    </style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
    <a href="/" class="back-btn">
        ← Буцах
    </a>
    <div class="test-info">
        <span class="test-badge">{{ title }}</span>
        <span class="test-meta">{{ subtitle }}</span>
    </div>
    <div class="progress-info">
        <span class="q-counter"><span id="currentQ">1</span> / <span id="totalQ">-</span></span>
    </div>
</div>

<div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressFill"></div>
</div>

<div class="main">
    <div id="questionsWrap">
        <!-- Questions rendered by JS -->
    </div>

    <div class="calculating" id="calculating">
        <div class="calc-spinner"></div>
        <div class="calc-title">Үр дүнг тооцоолж байна...</div>
        <div class="calc-sub">Таны хариултуудыг шинжилж, мэргэжлийн зөвлөмж бэлтгэж байна.</div>
    </div>
</div>

<script>
const QUESTIONS = {{ questions|safe }};
const TEST_TYPE = '{{ test_type }}';

const TYPE_COLORS = {
    R: { bg: '#FFF3EE', color: '#7A2A15', accent: '#E8603C', label: '🔧 Бодит' },
    I: { bg: '#EEF7FF', color: '#0D3A52', accent: '#2E86AB', label: '🔬 Судлаач' },
    A: { bg: '#F8F0FF', color: '#3D1547', accent: '#7B2D8B', label: '🎨 Уран бүтээлч' },
    S: { bg: '#EEFFF4', color: '#0D3D1E', accent: '#2D9B4E', label: '🤝 Нийгмийн' },
    E: { bg: '#FFFBEE', color: '#4D3800', accent: '#C9A227', label: '🚀 Манлайлагч' },
    C: { bg: '#EEF4FF', color: '#0B2538', accent: '#1B4F72', label: '📊 Зохион байгуулалт' }
};

const SCORE_LABELS = ['', 'Огт тийм биш', 'Тийм биш', 'Тодорхойгүй', 'Тийм', 'Маш тийм'];
const SCORE_EMOJIS = ['', '😕', '🤔', '😐', '🙂', '😄'];

let answers = {};
let currentIndex = 0;
const total = QUESTIONS.length;

// Init
document.getElementById('totalQ').textContent = total;

// Render all question cards
function renderQuestions() {
    const wrap = document.getElementById('questionsWrap');
    
    QUESTIONS.forEach((q, idx) => {
        const tc = TYPE_COLORS[q.type];
        const div = document.createElement('div');
        div.className = 'question-container' + (idx === 0 ? ' active' : '');
        div.id = `q-${idx}`;
        
        div.innerHTML = `
            <div class="q-header">
                <div class="q-type-tag" style="background:${tc.bg}; color:${tc.color}">
                    ${tc.label}
                </div>
                <div class="q-num">Асуулт ${idx + 1} / ${total}</div>
                <div class="q-text">${q.text}</div>
            </div>

            <div class="scale-label-top">
                <span class="scale-label-text">Огт тийм биш</span>
                <span class="scale-label-text">Маш тийм</span>
            </div>

            <div class="rating-scale">
                ${[1,2,3,4,5].map(s => `
                    <button class="rating-btn" data-score="${s}" data-qid="${q.id}" onclick="selectScore(${idx}, ${s}, this)">
                        <span class="score">${SCORE_EMOJIS[s]}</span>
                        <span class="label">${SCORE_LABELS[s]}</span>
                    </button>
                `).join('')}
            </div>

            <div class="error-msg" id="err-${idx}">⚠️ Хариулт сонгоно уу</div>

            <div class="q-nav">
                <div class="progress-dots" id="dots-${idx}"></div>
                
                <div style="display:flex;gap:12px">
                    ${idx > 0 ? `<button class="nav-btn" onclick="goTo(${idx-1})">← Өмнөх</button>` : '<div></div>'}
                    ${idx < total - 1 
                        ? `<button class="nav-btn primary" onclick="nextQ(${idx})">Дараах →</button>`
                        : `<button class="nav-btn primary" onclick="submitTest()" style="background: #2D9B4E; border-color: #2D9B4E;">✓ Тест дуусгах</button>`
                    }
                </div>
            </div>
        `;
        
        wrap.appendChild(div);
    });
    
    renderDots(0);
}

function selectScore(qIdx, score, btn) {
    const q = QUESTIONS[qIdx];
    answers[String(q.id)] = score;
    
    // Update buttons
    const btns = btn.closest('.rating-scale').querySelectorAll('.rating-btn');
    btns.forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    
    // Hide error
    document.getElementById(`err-${qIdx}`).classList.remove('show');
    
    // Update dots
    renderDots(qIdx);
    
    // Auto-advance after short delay
    if (qIdx < total - 1) {
        setTimeout(() => goTo(qIdx + 1), 500);
    }
}

function nextQ(idx) {
    const q = QUESTIONS[idx];
    if (!answers[String(q.id)] && answers[String(q.id)] !== 0) {
        document.getElementById(`err-${idx}`).classList.add('show');
        return;
    }
    goTo(idx + 1);
}

function goTo(idx) {
    if (idx < 0 || idx >= total) return;
    
    document.getElementById(`q-${currentIndex}`).classList.remove('active');
    currentIndex = idx;
    document.getElementById(`q-${currentIndex}`).classList.add('active');
    
    document.getElementById('currentQ').textContent = idx + 1;
    
    // Update progress bar
    const pct = ((idx + 1) / total) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    
    renderDots(idx);
    
    // Re-select existing answer
    const q = QUESTIONS[idx];
    if (answers[String(q.id)]) {
        const btns = document.querySelectorAll(`#q-${idx} .rating-btn`);
        btns.forEach(b => {
            if (parseInt(b.dataset.score) === answers[String(q.id)]) {
                b.classList.add('selected');
            }
        });
    }
    
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function renderDots(activeIdx) {
    const dotsEl = document.getElementById(`dots-${activeIdx}`);
    if (!dotsEl) return;
    
    dotsEl.innerHTML = '';
    const showCount = Math.min(total, 20);
    const step = Math.floor(total / showCount);
    
    for (let i = 0; i < total; i += step || 1) {
        if (dotsEl.children.length >= 20) break;
        const dot = document.createElement('div');
        dot.className = 'dot';
        const q = QUESTIONS[i];
        if (answers[String(q.id)]) dot.classList.add('answered');
        if (i === activeIdx) dot.classList.add('current');
        dotsEl.appendChild(dot);
    }
}

async function submitTest() {
    // Check all answered
    const unanswered = QUESTIONS.filter(q => !answers[String(q.id)]);
    if (unanswered.length > 0) {
        const firstUnanswered = QUESTIONS.indexOf(unanswered[0]);
        document.getElementById(`err-${total-1}`).classList.add('show');
        // Navigate to first unanswered
        alert(`Та ${unanswered.length} асуултанд хариулаагүй байна. Бүх асуултанд хариулна уу.`);
        goTo(firstUnanswered);
        return;
    }
    
    // Show calculating
    document.getElementById('questionsWrap').style.display = 'none';
    document.getElementById('calculating').classList.add('show');
    
    try {
        const response = await fetch('/calculate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ answers, questions: QUESTIONS })
        });
        
        const data = await response.json();
        
        // Store result and redirect
        sessionStorage.setItem('riasecResult', JSON.stringify(data));
        sessionStorage.setItem('testType', TEST_TYPE);
        
        setTimeout(() => {
            window.location.href = '/result';
        }, 1000);
        
    } catch (err) {
        document.getElementById('questionsWrap').style.display = 'block';
        document.getElementById('calculating').classList.remove('show');
        alert('Алдаа гарлаа. Дахин оролдоно уу.');
    }
}

renderQuestions();
</script>

</body>
</html>
